<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handle API Errors</title>
</head>
<body>

    <h1>Handle API Errors</h1>

    <p>
        Enter a User ID and click the button.
        <br>
        If the user exists, their information will be displayed.
        <br>
        If the user does not exist, an error message will be shown.
    </p>

    <label for="userId">User ID:</label>
    <input type="number" id="userId" placeholder="Enter User ID">

    <button id="fetchBtn">Fetch User</button>

    <h3>Result</h3>

    <pre id="result">No data fetched.</pre>

    <br>

    <a href="index.html">⬅ Back to Home</a>

    <script>
        const button = document.getElementById("fetchBtn");
        const result = document.getElementById("result");

        button.addEventListener("click", () => {

            const id = document.getElementById("userId").value;

            fetch(`http://localhost:3000/users/${id}`)

                .then(response => {

                    if (!response.ok) {
                        throw new Error("User Not Found");
                    }

                    return response.json();
                })

                .then(data => {

                    result.textContent = JSON.stringify(data, null, 2);

                })

                .catch(error => {

                    result.textContent = error.message;

                });

        });
    </script>

</body>
</html>
