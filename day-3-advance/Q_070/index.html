<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMI Calculator</title>

<style>

body{
    font-family: Arial;
    width:500px;
    margin:40px auto;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

</style>

</head>
<body>

<h1>BMI Calculator</h1>

<input
type="number"
id="height"
placeholder="Height (cm)">

<input
type="number"
id="weight"
placeholder="Weight (kg)">

<button id="calculateBtn">
Calculate BMI
</button>

<h2 id="result"></h2>

<script src="script.js"></script>

</body>
</html>
