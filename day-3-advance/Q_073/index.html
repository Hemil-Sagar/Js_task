<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown Timer</title>

<style>

body{
    font-family: Arial;
    width:500px;
    margin:40px auto;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:15px 0;
}

button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
}

#timer{
    font-size:40px;
    margin-top:30px;
    font-weight:bold;
}

</style>

</head>
<body>

<h1>Countdown Timer</h1>

<input
type="number"
id="seconds"
placeholder="Enter Seconds">

<button id="startBtn">
Start
</button>

<button id="resetBtn">
Reset
</button>

<h2 id="timer">
00:00
</h2>

<script src="script.js"></script>

</body>
</html>
