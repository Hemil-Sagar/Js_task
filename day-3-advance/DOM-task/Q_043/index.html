<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 50px;
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        #increase {
            background-color: green;
            color: white;
        }

        #decrease {
            background-color: red;
            color: white;
        }

        #reset {
            background-color: gray;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Counter App</h2>

        <h1 id="count">0</h1>

        <button id="decrease">- Decrease</button>
        <button id="reset">Reset</button>
        <button id="increase">+ Increase</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
