<!--Change background color.-->

<!DOCTYPE html>
<html>
    <head>
        <title>
            Background color change
        </title>        
    </head>
    <body>
        <button id = "btn">Click me</button>
        <script>
        document.getElementById("btn").onclick = function(){
          document.body.style.backgroundColor = "Lightblue"
        }
        </script>
    </body>
</html>
