<!--Change text on button click.-->
<!DOCTYPE html>
<html>
    <head>
        <title>
            Button text change
        </title>        
    </head>
    <body>
        <button id = "btn" onclick="changeText()">Click me</button>
        <script>
        function changeText(){
          document.getElementById("btn").innerText = 'Clicked'
        }</script>
    </body>
</html>
