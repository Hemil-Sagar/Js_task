<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URL Shortener UI</title>

<style>

body{
    font-family: Arial;
    width: 600px;
    margin: 40px auto;
}

input{
    width:100%;
    padding:10px;
    margin:15px 0;
}

button{
    padding:10px 20px;
    margin-right:10px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
}

</style>

</head>
<body>

<h1>URL Shortener</h1>

<input
type="text"
id="url"
placeholder="Enter URL">

<button id="shortenBtn">
Shorten URL
</button>

<button id="copyBtn">
Copy
</button>

<h2 id="result"></h2>

<script src="script.js"></script>

</body>
</html>
